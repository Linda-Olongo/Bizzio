<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizzio</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='image/logo.png') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 30%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                radial-gradient(2px 2px at 20px 30px, rgba(255, 255, 255, 0.9), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255, 255, 255, 0.8), transparent),
                radial-gradient(1px 1px at 60px 90px, rgba(255, 255, 255, 0.7), transparent),
                radial-gradient(1px 1px at 80px 110px, rgba(255, 255, 255, 0.6), transparent),
                radial-gradient(2px 2px at 100px 130px, rgba(255, 255, 255, 0.9), transparent),
                radial-gradient(1px 1px at 120px 150px, rgba(255, 255, 255, 0.8), transparent);
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: sparkle 2s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes sparkle {
            0% { opacity: 0.3; transform: scale(1) rotate(0deg); }
            100% { opacity: 1; transform: scale(1.2) rotate(360deg); }
        }

        .loading-container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .brand-name {
            font-size: 6rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .loading-text {
            font-size: 1.5rem;
            color: #ffffff;
            margin-bottom: 40px;
            font-weight: 300;
            letter-spacing: 2px;
            animation: fadeInOut 3s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .loading-spinner {
            display: inline-block;
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 300px;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
            margin: 0 auto;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffffff, #ff69b4);
            border-radius: 3px;
            width: 0%;
            animation: fillProgress 3s ease-in-out forwards;
        }

        @keyframes fillProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .loading-dots {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: #ffffff;
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        .dot:nth-child(3) { animation-delay: 0s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1.2); opacity: 1; }
        }

        .version {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            font-weight: 300;
        }

        @media (max-width: 768px) {
            .brand-name {
                font-size: 4rem;
            }
            
            .loading-text {
                font-size: 1.2rem;
            }
            
            .progress-bar {
                width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="brand-name">bizzio</div>
        <div class="loading-text">Initialisation du système...</div>
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>
    
    <div class="version">Version 1.0.0</div>

    <script>
        setTimeout(() => {
            window.location.href = '/login';
        }, 3000);
    </script>

</body>
</html>
